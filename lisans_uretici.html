<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>⚡ Lisans Kodu Üretici</title>
<style>
  body { margin: 0; background: #0f172a; color: #f1f5f9;
         font-family: 'Segoe UI', sans-serif; display: flex;
         align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1e293b; border: 1px solid #334155;
          border-radius: 18px; padding: 32px; width: min(480px, 90vw);
          box-shadow: 0 20px 40px rgba(0,0,0,.6); }
  h1 { font-size: 20px; margin: 0 0 4px;  }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }
  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
  input[type=number] { background: #0f172a; border: 1px solid #475569;
    color: #f1f5f9; padding: 8px 12px; border-radius: 8px;
    font-size: 14px; width: 80px; margin-bottom: 16px; }
  button { background: linear-gradient(135deg,#10b981,#059669);
           color: #fff; border: none; border-radius: 10px;
           padding: 12px 28px; font-size: 15px; font-weight: 700;
           cursor: pointer; margin-bottom: 20px; width: 100%; }
  button:hover { opacity: .9; }
  #output { background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; padding: 16px; font-family: monospace;
            font-size: 14px; line-height: 2; letter-spacing: 1px;
            min-height: 60px; white-space: pre-wrap; color: #10b981; }
  .copy-btn { background: #334155; color: #f1f5f9; border: none;
              border-radius: 8px; padding: 8px 16px; font-size: 13px;
              cursor: pointer; margin-top: 12px; width: 100%; }
  .copy-btn:hover { background: #475569; }
  .note { font-size: 11px; color: #475569; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>⚡ Lisans Kodu Üretici</h1>
  <p class="sub">e-Okul Gelişim Düzeyi Sihirbazı — Alıcı lisans kodları</p>

  <label>Kaç kod üretilsin?</label>
  <input type="number" id="count" value="10" min="1" max="200">

  <button onclick="generate()">🔑 Kodları Üret</button>

  <div id="output">Butona tıklayın...</div>
  <button class="copy-btn" onclick="copyAll()">📋 Tümünü Kopyala</button>

  <p class="note">
    ⚠️ Bu dosyayı sadece siz kullanın — başkasıyla paylaşmayın.<br>
    Her alıcıya <b>bir</b> kod verin. Kodlar bir kez oluşturulur, tekrarlanmaz.
  </p>
</div>

<script>
const _ALPHA = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
const _SALT  = 0x7A59;

function _licHash(body) {
  let h = _SALT;
  for (let c of body) { h += c.charCodeAt(0); h = (h * 31) & 0xFFFFFF; }
  return [20,15,10,5].map(s => _ALPHA[(h>>s)&0x1F]).join('');
}

function genKey() {
  const b = Array.from({length:12}, () => _ALPHA[Math.floor(Math.random()*32)]).join('');
  const chk = _licHash(b);
  const full = b + chk;
  return [0,4,8,12].map(i => full.slice(i,i+4)).join('-');
}

function generate() {
  const n = parseInt(document.getElementById('count').value) || 10;
  const keys = Array.from({length:n}, genKey);
  document.getElementById('output').textContent = keys.join('\n');
}

function copyAll() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Kopyalandı!';
    setTimeout(() => btn.textContent = '📋 Tümünü Kopyala', 2000);
  });
}

// Sayfa açılınca otomatik üret
generate();
</script>
</body>
</html>
