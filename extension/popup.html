<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Okul Sihirbazı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            padding: 0;
        }
        
        .header {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .content {
            padding: 16px;
        }
        
        .status {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .status.active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        .status.inactive {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        .status-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .status-text {
            font-size: 13px;
            font-weight: 600;
        }
        
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #475569;
        }
        
        .btn-secondary:hover {
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.4);
        }
        
        .info {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #94a3b8;
        }
        
        .info strong {
            color: #10b981;
        }
        
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 11px;
            color: #64748b;
            border-top: 1px solid #334155;
        }
        
        .version {
            color: #7c3aed;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ e-Okul Sihirbazı</h1>
        <p>Chrome Extension</p>
    </div>
    
    <div class="content">
        <div class="status" id="status">
            <div class="status-icon">⚡</div>
            <div class="status-text">Kontrol ediliyor...</div>
        </div>
        
        <button class="btn" id="activateBtn">
            🚀 Sihirbazı Aktifleştir
        </button>
        
        <button class="btn btn-secondary" id="helpBtn">
            ❓ Nasıl Kullanılır?
        </button>
        
        <div class="info">
            <strong>✨ Özellikler:</strong><br>
            • Excel'den otomatik veri girişi<br>
            • Akıllı düzey hesaplama<br>
            • Çoklu şube desteği<br>
            • Tam otomasyon<br>
            • CSP bypass (güvenli)
        </div>
    </div>
    
    <div class="footer">
        <span class="version">v3.4.0</span> | 
        <a href="https://github.com/arizasahin-a11y/eokul-wizard" target="_blank" style="color: #10b981; text-decoration: none;">GitHub</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
